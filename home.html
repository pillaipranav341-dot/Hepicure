<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hepicure — Home</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">

  <!-- SIDE PANEL -->
  <aside class="side-panel">
    <div class="brand">
      <span class="mark lg"></span>
      <span class="brand-name">Hepicure</span>
    </div>

    <nav>
      <a class="nav-item active" href="home.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Home</span>
      </a>
      <a class="nav-item" href="subscription.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Subscription</span>
      </a>
      <a class="nav-item" href="track-order.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        <span>Track order</span>
      </a>
    </nav>

    <div class="user-chip" id="user-chip">
      <img id="user-photo" src="" alt="">
      <div>
        <div class="name" id="user-name">—</div>
        <a class="signout" href="#" onclick="hepicureSignOut(); return false;">Sign out</a>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <div>
        <h1 id="greeting">Hungry?</h1>
        <div class="greet-sub">Fresh menus, marked honestly — pick a meal.</div>
      </div>
    </div>

    <div class="control-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Search dishes — e.g. paneer, idli, chicken…">
      </div>
      <div class="veg-toggle" id="veg-toggle">
        <button class="active" data-veg="all">All</button>
        <button data-veg="veg"><span class="mark" style="width:12px;height:12px;"></span> Veg</button>
        <button data-veg="nonveg"><span class="mark nonveg" style="width:12px;height:12px;"></span> Non-veg</button>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="section-title">
      <span class="eyebrow">Most ordered</span>
      <h2>Best sellers</h2>
    </div>
    <div class="bestseller-row" id="bestseller-row"></div>

    <div class="section-title">
      <span class="eyebrow" id="menu-eyebrow">Menu</span>
      <h2 id="menu-title">All dishes</h2>
    </div>
    <div class="menu-grid" id="menu-grid"></div>
  </main>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/menu-data.js"></script>
<script src="js/home.js"></script>
</body>
</html>
